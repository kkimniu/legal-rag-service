services:
  db:
    image: postgres:16-alpine
    container_name: legal-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legal_rag}
      POSTGRES_USER: ${POSTGRES_USER:-legal_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legal_rag_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legal_rag} -d ${POSTGRES_DB:-legal_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: legal-rag-backend
    env_file:
      - .env
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-legal_rag}:${POSTGRES_PASSWORD:-legal_rag_password}@db:5432/${POSTGRES_DB:-legal_rag}
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      CHROMA_PERSIST_DIRECTORY: /app/chroma_db
      UPLOAD_DIRECTORY: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: legal-rag-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
